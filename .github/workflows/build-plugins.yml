name: Build Instrudio Plugins

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone JUCE
        run: git clone --depth 1 --branch 7.0.12 https://github.com/juce-framework/JUCE.git Instrudio_v2/plugin/JUCE

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S Instrudio_v2/plugin -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S Instrudio_v2/plugin -B build -Wno-dev

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          for inst in InstrudioViolin InstrudioGrand InstrudioHarp InstrudioBongos; do
            name=$(ls build/${inst}_artefacts/Release/VST3/ | head -1)
            cd build/${inst}_artefacts/Release/VST3 && zip -r ../../../../dist/${inst}-VST3-macOS.zip "$name" && cd ../../../../
            name=$(ls build/${inst}_artefacts/Release/AU/ 2>/dev/null | head -1)
            if [ -n "$name" ]; then
              cd build/${inst}_artefacts/Release/AU && zip -r ../../../../dist/${inst}-AU-macOS.zip "$name" && cd ../../../../
            fi
          done

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          foreach ($inst in @("InstrudioViolin","InstrudioGrand","InstrudioHarp","InstrudioBongos")) {
            $vst3 = Get-ChildItem "build\${inst}_artefacts\Release\VST3" -Directory | Select-Object -First 1
            if ($vst3) {
              Compress-Archive -Path $vst3.FullName -DestinationPath "dist\${inst}-VST3-Windows.zip"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: instrudio-plugins-${{ matrix.os }}
          path: dist/*.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
